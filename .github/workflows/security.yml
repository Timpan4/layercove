name: Security Audit

on:
  schedule:
    # Run weekly on Monday at 6:00 UTC
    - cron: '0 6 * * 1'
  push:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'spoolbuddy/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'requirements.txt'
      - 'frontend/package.json'
      - 'frontend/bun.lock'
      - '.github/workflows/security.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'spoolbuddy/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'requirements.txt'
      - 'frontend/package.json'
      - 'frontend/bun.lock'
      - '.github/workflows/security.yml'
  workflow_dispatch:
    # Allow manual trigger

env:
  PYTHON_VERSION: '3.11'
  BUN_VERSION: '1.3.14'

# Default permissions for all jobs
permissions:
  contents: read

jobs:
  bandit:
    name: Python Security Analysis (Bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[sarif]

      - name: Run Bandit
        run: |
          bandit -r backend/ -f sarif -o bandit-results.sarif --severity-level medium || true

      - name: Upload Bandit results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  trivy:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t bambuddy:security-scan .

      - name: Run Trivy vulnerability scanner
        run: |
          mkdir -p "$RUNNER_TEMP/trivy-cache"
          docker save bambuddy:security-scan --output "$RUNNER_TEMP/bambuddy-security-scan.tar"
          docker run --rm \
            -v "$RUNNER_TEMP:/scan" \
            -v "$RUNNER_TEMP/trivy-cache:/root/.cache/trivy" \
            -v "$PWD:/workspace" \
            docker.io/aquasec/trivy:0.69.1 image \
            --skip-version-check \
            --timeout 15m \
            --input /scan/bambuddy-security-scan.tar \
            --format sarif \
            --output /workspace/trivy-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Run Trivy for Dockerfile/IaC
        run: |
          docker run --rm \
            -v "$RUNNER_TEMP/trivy-cache:/root/.cache/trivy" \
            -v "$PWD:/workspace" \
            docker.io/aquasec/trivy:0.69.1 config \
            --skip-version-check \
            --timeout 15m \
            --skip-dirs /workspace/.git \
            --skip-dirs /workspace/frontend/node_modules \
            --format sarif \
            --output /workspace/trivy-config-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            /workspace

      - name: Upload Trivy config results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-config-results.sarif') != ''
        with:
          sarif_file: trivy-config-results.sarif
          category: trivy-config

  backend-audit:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        id: pip-audit
        run: |
          # CVE-2025-45768 (PYSEC-2025-183 / GHSA-65pc-fj4g-8rjx): disputed by PyJWT maintainers.
          # Advisory says "key length is chosen by the application that uses the library" — no
          # PyJWT fix exists or will exist. Bambuddy is safe: backend/app/core/auth.py:184 uses
          # secrets.token_urlsafe(64) (~86 chars of entropy) for auto-generated secrets and
          # rejects file-loaded secrets shorter than 32 chars at :177. Keep ignored permanently.
          pip-audit --desc on --format json --output pip-audit-results.json \
            --ignore-vuln CVE-2025-45768 \
            || echo "vulnerabilities_found=true" >> $GITHUB_OUTPUT
          pip-audit --desc on \
            --ignore-vuln CVE-2025-45768 \
            || true

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 30

      - name: Create or close pip security issue
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            // Check for existing open issue
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,automated'
            });
            const existingIssue = existingIssues.data.find(i => i.title.startsWith('Security Alert:') && i.title.includes('Python'));

            // If no vulnerabilities found, auto-close any stale issue
            if ('${{ steps.pip-audit.outputs.vulnerabilities_found }}' !== 'true') {
              if (existingIssue) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  body: 'All Python vulnerabilities have been resolved. Closing automatically.'
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  state: 'closed'
                });
                console.log(`Auto-closed resolved issue #${existingIssue.number}`);
              }
              return;
            }

            let results;
            try {
              results = JSON.parse(fs.readFileSync('pip-audit-results.json', 'utf8'));
            } catch {
              console.log('Could not read audit results');
              return;
            }

            // Build vulnerability table
            let table = '| Package | Version | Vulnerability | Fix Version |\n';
            table += '|---------|---------|---------------|-------------|\n';

            for (const vuln of results.dependencies || []) {
              for (const v of vuln.vulns || []) {
                table += `| ${vuln.name} | ${vuln.version} | ${v.id} | ${v.fix_versions?.join(', ') || 'N/A'} |\n`;
              }
            }

            const vulnCount = results.dependencies?.reduce((acc, d) => acc + (d.vulns?.length || 0), 0) || 0;

            if (vulnCount === 0) {
              console.log('No vulnerabilities to report');
              if (existingIssue) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  body: 'All Python vulnerabilities have been resolved. Closing automatically.'
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  state: 'closed'
                });
                console.log(`Auto-closed resolved issue #${existingIssue.number}`);
              }
              return;
            }

            const title = `Security Alert: ${vulnCount} Python vulnerabilities found`;

            const body = `## Automated Security Audit Results

            The weekly security audit found vulnerabilities in Python dependencies.

            ${table}

            ### Recommended Actions

            1. Review each vulnerability
            2. Update affected packages: \`pip install --upgrade <package>\`
            3. Run \`pip-audit\` locally to verify fixes

            ---
            *This issue was automatically created by the security audit workflow.*`;

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'automated', 'dependencies']
              });
              console.log('Created new security issue');
            }

  frontend-audit:
    name: Frontend Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run Bun audit
        id: bun-audit
        working-directory: frontend
        run: |
          set +e
          bun audit --prod --audit-level=high --json > bun-audit-results.json
          audit_exit=$?
          set -e

          vulnerability_count=$(bun -e "
            const results = JSON.parse(await Bun.file('bun-audit-results.json').text());
            const count = Object.values(results).reduce(
              (total, advisories) => total + (Array.isArray(advisories) ? advisories.length : 0),
              0,
            );
            process.stdout.write(String(count));
          ")

          if [ "$vulnerability_count" -gt 0 ]; then
            echo "vulnerabilities_found=true" >> "$GITHUB_OUTPUT"
            echo "$vulnerability_count high or critical production advisories found"
          elif [ "$audit_exit" -ne 0 ]; then
            echo "Bun audit failed without returning any advisories" >&2
            exit "$audit_exit"
          else
            echo "No high or critical production advisories found"
          fi

          echo "audit_succeeded=true" >> "$GITHUB_OUTPUT"
          bun audit --prod --audit-level=high || true

      - name: Upload audit results
        if: always() && hashFiles('frontend/bun-audit-results.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: bun-audit-results
          path: frontend/bun-audit-results.json
          retention-days: 30

      - name: Create or close Bun security issue
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,automated'
            });
            const existingIssue = existingIssues.data.find(issue => {
              const title = issue.title.toLowerCase();
              return title.startsWith('security alert:') && (title.includes('bun') || title.includes('npm'));
            });

            const closeResolvedIssue = async () => {
              if (!existingIssue) return;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: 'All high and critical Bun production advisories have been resolved. Closing automatically.'
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                state: 'closed'
              });
              console.log(`Auto-closed resolved issue #${existingIssue.number}`);
            };

            if ('${{ steps.bun-audit.outputs.audit_succeeded }}' !== 'true') {
              console.log('Bun audit did not complete successfully; leaving any existing security issue unchanged');
              return;
            }

            if ('${{ steps.bun-audit.outputs.vulnerabilities_found }}' !== 'true') {
              await closeResolvedIssue();
              return;
            }

            let results;
            try {
              results = JSON.parse(fs.readFileSync('frontend/bun-audit-results.json', 'utf8'));
            } catch {
              console.log('Could not read Bun audit results');
              return;
            }

            const advisories = Object.entries(results).flatMap(([name, packageAdvisories]) =>
              (Array.isArray(packageAdvisories) ? packageAdvisories : []).map(advisory => ({ name, ...advisory }))
            );

            if (advisories.length === 0) {
              console.log('No advisories to report');
              await closeResolvedIssue();
              return;
            }

            const escapeCell = value => String(value ?? 'N/A').replaceAll('|', '\\|').replaceAll('\n', ' ');
            let table = '| Package | Severity | Advisory | Vulnerable Versions |\n';
            table += '|---------|----------|----------|---------------------|\n';

            for (const advisory of advisories) {
              const title = escapeCell(advisory.title);
              const reference = advisory.url ? `[${title}](${advisory.url})` : title;
              table += `| ${escapeCell(advisory.name)} | ${escapeCell(advisory.severity)} | ${reference} | ${escapeCell(advisory.vulnerable_versions)} |\n`;
            }

            const title = `Security Alert: ${advisories.length} Bun production advisories found`;
            const body = `## Automated Security Audit Results

            The weekly security audit found high or critical advisories in Bun production dependencies.

            ${table}

            ### Recommended Actions

            1. Review each advisory: \`bun audit --prod --audit-level=high\`
            2. Update affected dependencies in \`package.json\` and regenerate \`bun.lock\` with \`bun install\`
            3. Re-run the audit locally to verify the updates

            ---
            *This issue was automatically created by the security audit workflow.*`;

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                title,
                body
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security', 'automated', 'dependencies']
              });
              console.log('Created new security issue');
            }
